# AI-assisted work responsibility path minimal example
#
# Construction status: under-construction
# Purpose: show a small copyable record for AI-assisted work review.
# Boundary: illustrative only; not certification, legal review, safety review,
# compliance review, fairness review, production approval, or AI final-responsibility transfer.

id: ai_assisted_work_minimal_001
version: 0.1.0
lifecycle_state: originating

nodes:
  - id: human_reviewer_001
    type: Human
    capabilities:
      - receive
      - review
      - approve
      - reject
      - stop
      - return
    authority_scope:
      can_decide: true
      can_approve: true
      can_execute: false
      can_stop: true
      can_repair: true
      can_close: true
    evidence_binding:
      required: true
      log_reference: evidence_log_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: true

  - id: ai_assistant_001
    type: AIAgent
    capabilities:
      - draft
      - summarize
      - structure
      - explain_uncertainty
      - return
    authority_scope:
      can_decide: false
      can_approve: false
      can_execute: false
      can_stop: false
      can_repair: false
      can_close: false
    evidence_binding:
      required: true
      log_reference: evidence_log_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: false
    ai_participation:
      may_generate: true
      may_summarize: true
      may_recommend: true
      may_execute_under_authority: false
      assumes_final_responsibility: false

edges:
  - from: human_reviewer_001
    to: ai_assistant_001
    relation_type: delegated_support
    condition: human_requests_drafting_or_review_support
    evidence_reference: evidence_log_001

  - from: ai_assistant_001
    to: human_reviewer_001
    relation_type: return_to_authority
    condition: draft_requires_human_review_or_approval
    evidence_reference: evidence_log_001

roles:
  decision_owner: human_reviewer_001
  approval_gate: human_reviewer_001
  execution_actor: null
  stop_authority: human_reviewer_001
  evidence_log: evidence_log_001
  repair_owner: human_reviewer_001
  return_point: return_point_001
  human_return_point: return_point_001
  affected_party: null

action_class:
  id: class_c_approval_required_internal_work
  label: Class C
  name: Approval-Required Internal Work
  source_aligned_class: C
  description: AI-assisted internal drafting or review support where a human must review and approve before use.
  responsibility_requirements:
    decision_owner_required: true
    approval_gate_required: true
    stop_authority_required: true
    evidence_log_required: true
    return_point_required: true
    repair_owner_required: true
    affected_party_visibility_required: false
  reversibility: reversible
  external_impact: internal
  execution_effect: internal_record_or_document_update_if_approved
  automation_boundary:
    may_be_automated: false
    requires_human_review: true
    requires_human_authorization: true
    prohibited_without_explicit_authority: true
  excluded_interpretations:
    - not_autonomous_execution
    - not_external_publication
    - not_approval_of_ai_decision
    - not_production_ready

evidence_logs:
  - id: evidence_log_001
    pathway_id: ai_assisted_work_minimal_001
    evidence_categories:
      - source_reference
      - human_instruction
      - ai_draft_or_summary
      - human_review_status
      - uncertainty
      - approval_state
    integrity_state: partial
    ordering: timestamped
    reconstruction_support:
      can_reconstruct_action: true
      can_reconstruct_authority: true
      can_reconstruct_context: true
      can_reconstruct_uncertainty: true
      can_reconstruct_stop_point: true
      can_reconstruct_return_point: true
      can_reconstruct_repair_action: partial
    quality:
      completeness: partial
      readability: human_readable
      availability: local_example
      scope_clarity: example_only
      retention_period: not_specified
      privacy_constraints: avoid_sensitive_or_personal_data
      safety_constraints: no_production_use
    access_boundary:
      readable_by:
        - human_reviewer_001
      writable_by:
        - human_reviewer_001
      redaction_required: false
      retention_owner: human_reviewer_001
      repair_owner_access: human_reviewer_001

return_points:
  - id: return_point_001
    type: HumanReturnPoint
    source_node: ai_assistant_001
    target_node: human_reviewer_001
    returnability_conditions:
      meaning_visible: true
      authority_visible: true
      time_available: true
      information_quality_sufficient: partial
      trust_calibrated: true
      reversibility_or_compensation_visible: true
      value_visible: true
      cost_visible: true
    supported_actions:
      - explain
      - request_revision
      - reject
      - suspend
      - approve_after_review
      - repair
    evidence_requirements:
      evidence_log_required: true
      minimum_evidence_categories:
        - source_reference
        - human_instruction
        - ai_draft_or_summary
        - approval_state
        - uncertainty
      reconstruction_required: true
      access_boundary: local_review
    human_conditions:
      understandable_information: true
      meaningful_choice: true
      refusal_available: true
      stop_authority_available: true
      repair_path_available: true
      adequate_review_time: true
      no_coercive_pressure: true

repairs: []

responsibility_boundary:
  human_author_required: true
  ai_final_responsibility_allowed: false
  institutional_authority_required_when_applicable: true
  legal_or_moral_claims_out_of_scope: true

formalization_scope:
  assumptions:
    - The example models internal AI-assisted work before external publication or deployment.
    - AI assistance may draft, summarize, or structure, but does not approve or execute.
    - The human reviewer remains the final responsibility holder for review, approval, stop, and repair decisions.
  modeled_entities:
    - human_reviewer_001
    - ai_assistant_001
    - evidence_log_001
    - return_point_001
  excluded_claims:
    - legal_liability
    - moral_blame
    - compliance
    - safety
    - fairness
    - production_readiness
    - real_world_accountability_resolution
  theorem_status: not_formalized

review_metadata:
  review_tool_version: manual-example-review-0.1
  checked_items:
    - human decision owner is explicit
    - AI support node cannot approve or execute
    - evidence log and human return point are present
    - non-claim boundary is visible
  unchecked_items:
    - legal validity
    - safety certification
    - compliance certification
    - fairness certification
    - moral accountability resolution
    - production readiness
  review_result:
    status: example_ready_for_review
    not_claimed:
      - legal validity
      - safety certification
      - compliance certification
      - fairness certification
      - moral accountability resolution
      - production readiness
