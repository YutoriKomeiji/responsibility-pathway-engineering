# Missed-support boundary example
#
# This example models a small repository-maintenance case where an AI support node
# proposes a public-facing documentation or navigation update but should have returned
# to the human maintainer for review before publication.
#
# It is a boundary-only example.
# It is not a schema change, checker change, workflow change, runtime connector,
# production runtime, legal assessment, safety assessment, compliance review,
# fairness review, certification, or production-ready pattern.

id: missed_support_boundary_001
version: 0.1.0
lifecycle_state: returning

nodes:
  - id: human_maintainer_001
    type: Human
    capabilities:
      - receive
      - review
      - approve
      - reject
      - stop
      - return
      - repair
      - close
    authority_scope:
      can_decide: true
      can_approve: true
      can_execute: false
      can_stop: true
      can_repair: true
      can_close: true
    evidence_binding:
      required: true
      log_reference: evidence_log_missed_support_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: true

  - id: ai_support_node_001
    type: AIAgent
    capabilities:
      - receive
      - generate
      - recommend
      - explain
      - return
    authority_scope:
      can_decide: false
      can_approve: false
      can_execute: false
      can_stop: false
      can_repair: false
      can_close: false
    evidence_binding:
      required: true
      log_reference: evidence_log_missed_support_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: false
    ai_participation:
      may_generate: true
      may_recommend: true
      may_classify: false
      may_execute_under_authority: false
      assumes_final_responsibility: false

  - id: repository_documentation_001
    type: InformationSystem
    capabilities:
      - preserve
      - publish
      - version
    authority_scope:
      can_decide: false
      can_approve: false
      can_execute: true
      can_stop: false
      can_repair: false
      can_close: false
    evidence_binding:
      required: true
      log_reference: evidence_log_missed_support_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: false

edges:
  - from: human_maintainer_001
    to: ai_support_node_001
    relation_type: delegated_drafting_support
    condition: human_requests_small_navigation_update_draft
    evidence_reference: evidence_log_missed_support_001

  - from: ai_support_node_001
    to: human_maintainer_001
    relation_type: required_support_call
    condition: public_facing_navigation_update_requires_human_review
    evidence_reference: evidence_log_missed_support_001

  - from: ai_support_node_001
    to: human_maintainer_001
    relation_type: missed_support_return
    condition: ai_support_node_prepared_public_facing_update_without_requesting_review
    evidence_reference: evidence_log_missed_support_001

roles:
  decision_owner: human_maintainer_001
  approval_gate: human_maintainer_001
  execution_actor: repository_documentation_001
  stop_authority: human_maintainer_001
  evidence_log: evidence_log_missed_support_001
  repair_owner: human_maintainer_001
  return_point: return_point_missed_support_001
  human_return_point: return_point_missed_support_001
  affected_party: null

action_class:
  id: class_c_approval_required_missed_support_boundary
  label: Class C
  name: Approval-Required
  source_aligned_class: C
  description: Boundary-only repository documentation update where human review should have been requested before a public-facing change.
  responsibility_requirements:
    decision_owner_required: true
    approval_gate_required: true
    execution_actor_required: true
    stop_authority_required: true
    evidence_log_required: true
    return_point_required: true
    repair_owner_required: true
    affected_party_visibility_required: false
    rollback_or_correction_path_required: true
    restart_approval_required: true
  reversibility: reversible
  external_impact: public_facing_repository_documentation
  execution_effect: documentation_visibility_change
  automation_boundary:
    may_be_automated: false
    requires_human_review: true
    requires_human_authorization: true
    prohibited_without_explicit_authority: true
    autonomous_execution_disallowed: true
  excluded_interpretations:
    - not_autonomous_execution
    - not_production_connector
    - not_runtime_correctness_claim
    - not_certification
    - not_legal_review
    - not_safety_review
    - not_compliance_review
    - not_fairness_review
    - not_production_ready

support_call_policy:
  status: missed_support_boundary_signal
  support_should_have_been_requested: true
  missed_support_recorded: true
  support_type:
    - human_review
    - approval_gate
    - stop_authority
  required_support_node: human_maintainer_001
  reason: public_facing_navigation_update_requires_human_review_before_publication
  boundary: example_only_not_schema_enforced

evidence_logs:
  - id: evidence_log_missed_support_001
    pathway_id: missed_support_boundary_001
    evidence_categories:
      - request
      - ai_proposal
      - proposed_navigation_change
      - required_human_review
      - missed_support_signal
      - stop_condition
      - return_point
      - repair_path
      - excluded_claims
    integrity_state: partial
    ordering: timestamped
    reconstruction_support:
      can_reconstruct_action: true
      can_reconstruct_authority: true
      can_reconstruct_context: partial
      can_reconstruct_uncertainty: true
      can_reconstruct_stop_point: true
      can_reconstruct_return_point: true
      can_reconstruct_repair_action: true
    quality:
      completeness: partial
      readability: human_readable
      availability: local_example
      scope_clarity: missed_support_boundary_only
      retention_period: not_specified
      privacy_constraints: avoid_sensitive_data
      safety_constraints: no_production_use
    access_boundary:
      readable_by:
        - human_maintainer_001
      writable_by:
        - human_maintainer_001
      redaction_required: false
      retention_owner: human_maintainer_001
      repair_owner_access: human_maintainer_001

return_points:
  - id: return_point_missed_support_001
    type: HumanReturnPoint
    source_node: ai_support_node_001
    target_node: human_maintainer_001
    returnability_conditions:
      meaning_visible: true
      authority_visible: true
      time_available: true
      information_quality_sufficient: partial
      trust_calibrated: partial
      reversibility_or_compensation_visible: true
      value_visible: true
      cost_visible: true
    supported_actions:
      - review
      - approve
      - reject
      - request_revision
      - stop
      - repair
      - close
    evidence_requirements:
      evidence_log_required: true
      minimum_evidence_categories:
        - request
        - ai_proposal
        - required_human_review
        - missed_support_signal
        - stop_condition
        - authority_state
      reconstruction_required: true
      access_boundary: local_review
    human_conditions:
      understandable_information: true
      meaningful_choice: true
      refusal_available: true
      stop_authority_available: true
      repair_path_available: true
      adequate_review_time: true
      no_coercive_pressure: true

repairs:
  - id: repair_missed_support_001
    pathway_id: missed_support_boundary_001
    trigger: public_facing_navigation_update_prepared_without_required_human_review
    repair_owner: human_maintainer_001
    repair_state: required_before_continuation
    evidence_reference: evidence_log_missed_support_001
    affected_parties:
      - repository_readers
    corrective_action:
      - stop_publication
      - request_human_review
      - revise_or_reject_update
      - preserve_missed_support_note
    outcome:
      state: awaiting_human_review
      boundary: example_only

returning:
  previous_lifecycle_state: originating
  automatic_continuation_allowed: false
  automatic_closure_allowed: false
  automatic_repair_completion_allowed: false
  required_before_next_state:
    - human_maintainer_reviews_missed_support_signal
    - approval_gate_confirms_or_rejects_public_facing_update
    - stop_authority_confirms_publication_remains_paused
    - repair_owner_records_revision_or_rejection
  disallowed_interpretations:
    - returning_does_not_mean_automatic_continuation
    - returning_does_not_mean_repair_completion
    - returning_does_not_mean_closure
    - returning_does_not_mean_certification
    - returning_does_not_mean_ai_decision

responsibility_boundary:
  human_author_required: true
  ai_final_responsibility_allowed: false
  institutional_authority_required_when_applicable: false
  legal_or_moral_claims_out_of_scope: true

formalization_scope:
  assumptions:
    - The example models a repository-maintenance documentation update only.
    - The AI node may draft or propose a public-facing navigation change.
    - Human review is required before publication.
    - Missed support is treated as a structural review signal only.
    - The example does not claim production readiness or runtime correctness.
  modeled_entities:
    - human_maintainer_001
    - ai_support_node_001
    - repository_documentation_001
    - evidence_log_missed_support_001
    - return_point_missed_support_001
    - repair_missed_support_001
  excluded_claims:
    - legal_liability
    - moral_blame
    - compliance
    - production_safety
    - fairness
    - certification
    - runtime_correctness
    - connector_correctness
    - production_readiness
    - real_world_accountability_resolution
  theorem_status: not_formalized
