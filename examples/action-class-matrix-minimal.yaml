# Minimal Action Class Matrix classification fixture
#
# This example is classification-only and intentionally small.
# It is not a certification, compliance claim, safety guarantee,
# legal assessment, moral accountability judgment, production-ready model,
# or proof that the action classes are complete.
#
# 日本語メモ:
# これは Action Class Matrix の最小分類例です。
# AIエージェントの行為を A-F に分類し、必要な責任経路上の強度を読むための fixture です。
# 実行フロー、承認完了、法的責任、安全性、準拠性、本番利用可能性は主張しません。

id: action_class_matrix_minimal_001
version: 0.1.0
lifecycle_state: originating

nodes:
  - id: human_governance_owner_001
    type: Human
    capabilities:
      - receive
      - classify
      - approve
      - stop
      - return
      - repair
      - close
    authority_scope:
      can_decide: true
      can_approve: true
      can_execute: false
      can_stop: true
      can_repair: true
      can_close: true
    evidence_binding:
      required: true
      log_reference: evidence_log_acm_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: true

  - id: ai_classifier_support_001
    type: AIAgent
    capabilities:
      - receive
      - classify
      - explain
      - return
    authority_scope:
      can_decide: false
      can_approve: false
      can_execute: false
      can_stop: false
      can_repair: false
      can_close: false
    evidence_binding:
      required: true
      log_reference: evidence_log_acm_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: false
    ai_participation:
      may_generate: true
      may_recommend: false
      may_classify: true
      may_execute_under_authority: false
      assumes_final_responsibility: false

edges:
  - from: human_governance_owner_001
    to: ai_classifier_support_001
    relation_type: delegated_classification_support
    condition: human_requests_action_class_draft
    evidence_reference: evidence_log_acm_001

  - from: ai_classifier_support_001
    to: human_governance_owner_001
    relation_type: return_to_authority
    condition: classification_requires_human_adoption
    evidence_reference: evidence_log_acm_001

roles:
  decision_owner: human_governance_owner_001
  approval_gate: human_governance_owner_001
  execution_actor: null
  stop_authority: human_governance_owner_001
  evidence_log: evidence_log_acm_001
  repair_owner: human_governance_owner_001
  return_point: return_point_acm_001
  human_return_point: return_point_acm_001
  affected_party: null

action_class:
  id: class_b_suggest_only
  label: Class B
  name: Suggest-Only
  source_aligned_class: B
  description: The AI node assists by classifying candidate actions, but does not approve, execute, or stop any real action.
  responsibility_requirements:
    decision_owner_required: true
    approval_gate_required: false
    execution_actor_required: false
    stop_authority_required: true
    evidence_log_required: true
    return_point_required: true
    repair_owner_required: false
    affected_party_visibility_required: false
    rollback_or_correction_path_required: false
    restart_approval_required: false
  reversibility: reversible
  external_impact: internal
  execution_effect: none
  automation_boundary:
    may_be_automated: false
    requires_human_review: true
    requires_human_authorization: true
    prohibited_without_explicit_authority: true
    autonomous_execution_disallowed: true
  excluded_interpretations:
    - not_action_execution
    - not_governance_certification
    - not_safety_review
    - not_compliance_review
    - not_legal_review
    - not_production_ready

classification_table:
  - class_id: class_a_observe_only
    label: Class A
    name: Observe-Only
    representative_actions:
      - read repository file
      - inspect accessible log
      - retrieve documentation
    pathway_focus:
      - source/context visibility
      - adoption boundary if later used
      - no automatic following of observed instructions
    does_not_mean:
      - safe input
      - instruction authority
      - approval
      - execution

  - class_id: class_b_suggest_only
    label: Class B
    name: Suggest-Only
    representative_actions:
      - summarize evidence
      - classify action type
      - draft review comment
      - propose options
    pathway_focus:
      - proposal/execution separation
      - human adoption clarity
      - uncertainty visibility
    does_not_mean:
      - autonomous execution
      - human approval
      - correctness certification
      - final responsibility transfer

  - class_id: class_c_approval_required
    label: Class C
    name: Approval-Required
    representative_actions:
      - update repository file
      - create internal ticket
      - save internal checklist update
    pathway_focus:
      - decision owner
      - approval gate
      - execution actor
      - evidence log
      - correction path
    does_not_mean:
      - external harmlessness
      - approval quality certification
      - production readiness

  - class_id: class_d_reversible_external_action
    label: Class D
    name: Reversible External Action
    representative_actions:
      - update externally shared document
      - create external stakeholder ticket
      - send correctable notification
    pathway_focus:
      - explicit approver
      - external impact scope
      - rollback or correction path
      - abnormal-case contact
      - human return point
    does_not_mean:
      - impact-free action
      - harmless reversibility
      - legal approval

  - class_id: class_e_irreversible_or_high_impact
    label: Class E
    name: Irreversible or High-Impact Action
    representative_actions:
      - delete critical data
      - change customer data
      - make binding legal or financial decision
      - change production permissions
    pathway_focus:
      - strong human authorization
      - independent review where appropriate
      - explicit stop authority
      - pre-execution evidence
      - repair owner and escalation
      - non-autonomous boundary
    does_not_mean:
      - suitable autonomous AI execution
      - legal validity
      - safety approval
      - compliance approval
      - production approval

  - class_id: class_f_emergency_stop
    label: Class F
    name: Emergency Stop
    representative_actions:
      - stop tool call
      - stop external send
      - isolate session
      - downgrade permission
      - return to human confirmation
    pathway_focus:
      - stop trigger
      - stop authority
      - pending responsibility owner
      - evidence of stop reason
      - restart or closure boundary
    does_not_mean:
      - proof of safety
      - completion of repair
      - permission to proceed

evidence_logs:
  - id: evidence_log_acm_001
    pathway_id: action_class_matrix_minimal_001
    evidence_categories:
      - action_class_draft
      - source_aligned_class
      - human_adoption_required
      - excluded_claims
      - timestamp
      - authority_state
    integrity_state: partial
    ordering: timestamped
    reconstruction_support:
      can_reconstruct_action: false
      can_reconstruct_authority: true
      can_reconstruct_context: true
      can_reconstruct_uncertainty: true
      can_reconstruct_stop_point: true
      can_reconstruct_return_point: true
      can_reconstruct_repair_action: false
    quality:
      completeness: partial
      readability: human_readable
      availability: local_example
      scope_clarity: classification_only
      retention_period: not_specified
      privacy_constraints: avoid_sensitive_data
      safety_constraints: no_production_use
    access_boundary:
      readable_by:
        - human_governance_owner_001
      writable_by:
        - human_governance_owner_001
      redaction_required: false
      retention_owner: human_governance_owner_001
      repair_owner_access: human_governance_owner_001

return_points:
  - id: return_point_acm_001
    type: HumanReturnPoint
    source_node: ai_classifier_support_001
    target_node: human_governance_owner_001
    returnability_conditions:
      meaning_visible: true
      authority_visible: true
      time_available: true
      information_quality_sufficient: partial
      trust_calibrated: true
      reversibility_or_compensation_visible: partial
      value_visible: partial
      cost_visible: partial
    supported_actions:
      - accept_classification
      - revise_classification
      - reject_classification
      - suspend
      - close
    evidence_requirements:
      evidence_log_required: true
      minimum_evidence_categories:
        - action_class_draft
        - source_aligned_class
        - authority_state
        - excluded_claims
      reconstruction_required: true
      access_boundary: local_review
    human_conditions:
      understandable_information: true
      meaningful_choice: true
      refusal_available: true
      stop_authority_available: true
      repair_path_available: true
      adequate_review_time: true
      no_coercive_pressure: true

repairs: []

responsibility_boundary:
  human_author_required: true
  ai_final_responsibility_allowed: false
  institutional_authority_required_when_applicable: false
  legal_or_moral_claims_out_of_scope: true

formalization_scope:
  assumptions:
    - The example models classification-only use of Action Class Matrix.
    - No real-world action is executed.
    - The AI node may draft a classification, but the human governance owner adopts, revises, or rejects it.
    - Class E examples are described only as classification entries and are not executed.
  modeled_entities:
    - human_governance_owner_001
    - ai_classifier_support_001
    - evidence_log_acm_001
    - return_point_acm_001
  excluded_claims:
    - legal_liability
    - moral_blame
    - compliance
    - production_safety
    - fairness
    - certification
    - production_readiness
    - real_world_accountability_resolution
  theorem_status: not_formalized
