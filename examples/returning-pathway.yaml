# Minimal returning pathway example
#
# This example illustrates a Responsibility Pathway that returns from a
# suspended state to an authorized human decision owner after review.
#
# Returning is not automatic continuation, repair completion, closure,
# certification, compliance, safety, fairness, legal validity, moral
# resolution, or production readiness.
#
# 日本語メモ:
# これは一時停止状態から、人間の判断主体へ責任経路を戻す最小例です。
# returning は自動再開ではありません。
# 証拠、権限、レビュー条件が確認された後に、判断主体へ戻る状態です。
# AI支援ノードは復帰候補を整理できますが、復帰判断主体にも最終責任主体にもなりません。

id: returning_pathway_example_001
version: 0.1.0
lifecycle_state: returning

nodes:
  - id: human_decision_owner_001
    type: Human
    capabilities:
      - receive
      - explain
      - review
      - decide
      - continue
      - repair
      - suspend
      - close
    authority_scope:
      can_decide: true
      can_approve: true
      can_execute: false
      can_stop: true
      can_repair: true
      can_close: true
    evidence_binding:
      required: true
      log_reference: evidence_log_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: true

  - id: ai_support_node_001
    type: AIAgent
    capabilities:
      - receive
      - preserve
      - summarize
      - explain
      - compare_conditions
      - recommend_return
      - return
    authority_scope:
      can_decide: false
      can_approve: false
      can_execute: false
      can_stop: false
      can_repair: false
      can_close: false
    evidence_binding:
      required: true
      log_reference: evidence_log_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: false
    ai_participation:
      may_generate: true
      may_recommend: true
      may_classify: true
      may_summarize_evidence: true
      may_compare_return_conditions: true
      may_execute_under_authority: false
      assumes_final_responsibility: false

  - id: stop_authority_001
    type: Human
    capabilities:
      - receive
      - explain
      - confirm_suspension
      - release_to_decision_owner
      - resuspend
      - escalate
    authority_scope:
      can_decide: false
      can_approve: false
      can_execute: false
      can_stop: true
      can_repair: false
      can_close: false
    evidence_binding:
      required: true
      log_reference: evidence_log_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: true

edges:
  - from: stop_authority_001
    to: ai_support_node_001
    relation_type: review_support_request
    condition: suspended_pathway_requires_return_condition_summary
    evidence_reference: evidence_log_001

  - from: ai_support_node_001
    to: stop_authority_001
    relation_type: return_condition_summary
    condition: AI_summary_requires_human_or_institutional_review
    evidence_reference: evidence_log_001

  - from: stop_authority_001
    to: human_decision_owner_001
    relation_type: return_to_decision_owner
    condition: return_conditions_are_visible_but_final_decision_required
    evidence_reference: evidence_log_001

  - from: human_decision_owner_001
    to: human_decision_owner_001
    relation_type: decision_owner_review
    condition: decision_owner_reviews_returned_pathway_before_continuation_or_repair
    evidence_reference: evidence_log_001

roles:
  decision_owner: human_decision_owner_001
  approval_gate: human_decision_owner_001
  execution_actor: null
  stop_authority: stop_authority_001
  evidence_log: evidence_log_001
  repair_owner: human_decision_owner_001
  return_point: return_point_001
  human_return_point: return_point_001
  affected_party: null

returning:
  id: returning_001
  pathway_id: returning_pathway_example_001
  returning_owner: human_decision_owner_001
  previous_lifecycle_state: suspended
  returning_state: under_human_review
  automatic_continuation_allowed: false
  automatic_closure_allowed: false
  automatic_repair_completion_allowed: false
  required_before_next_state:
    - review_evidence_log
    - confirm_authority_state
    - confirm_remaining_uncertainty
    - choose_continue_repair_suspend_or_close
  allowed_next_states:
    - originating
    - repaired
    - suspended
    - closed
  disallowed_interpretations:
    - returning_as_automatic_continuation
    - returning_as_repair_completion
    - returning_as_closure
    - returning_as_certification
    - returning_as_ai_decision

action_class:
  id: class_2_returning_review
  name: Returning Review
  level: 2
  description: Review state where a suspended pathway is returned to an authorized human decision owner.
  responsibility_requirements:
    decision_owner_required: true
    approval_gate_required: true
    stop_authority_required: true
    evidence_log_required: true
    return_point_required: true
    repair_owner_required: true
    affected_party_visibility_required: false
  reversibility: pending_human_decision
  external_impact: internal
  automation_boundary:
    may_be_automated: false
    requires_human_review: true
    requires_human_authorization: true
    prohibited_without_explicit_authority: true

evidence_logs:
  - id: evidence_log_001
    pathway_id: returning_pathway_example_001
    evidence_categories:
      - actor_identity_or_role
      - decision_owner
      - stop_authority
      - prior_lifecycle_state
      - input
      - output
      - prompt_or_instruction
      - timestamp
      - authority_state
      - uncertainty
      - return_condition
      - next_state_options
    integrity_state: partial
    ordering: timestamped
    reconstruction_support:
      can_reconstruct_action: true
      can_reconstruct_authority: true
      can_reconstruct_context: true
      can_reconstruct_uncertainty: true
      can_reconstruct_stop_point: true
      can_reconstruct_return_point: true
      can_reconstruct_repair_action: false
      can_reconstruct_return_decision_basis: true
    quality:
      completeness: partial
      readability: human_readable
      availability: local_example
      scope_clarity: example_only
      retention_period: not_specified
      privacy_constraints: avoid_sensitive_data
      safety_constraints: no_production_use
    access_boundary:
      readable_by:
        - human_decision_owner_001
        - stop_authority_001
      writable_by:
        - human_decision_owner_001
        - stop_authority_001
      redaction_required: false
      retention_owner: human_decision_owner_001
      repair_owner_access: true

return_points:
  - id: return_point_001
    type: HumanReturnPoint
    source_node: stop_authority_001
    target_node: human_decision_owner_001
    returnability_conditions:
      meaning_visible: true
      authority_visible: true
      time_available: true
      information_quality_sufficient: partial
      trust_calibrated: true
      reversibility_or_compensation_visible: pending_human_decision
      value_visible: partial
      cost_visible: partial
    supported_actions:
      - explain
      - continue_after_review
      - repair_after_review
      - suspend_again
      - close_after_review
      - escalate
    evidence_requirements:
      evidence_log_required: true
      minimum_evidence_categories:
        - prior_lifecycle_state
        - authority_state
        - uncertainty
        - return_condition
        - next_state_options
      reconstruction_required: true
      access_boundary: local_review
    human_conditions:
      understandable_information: true
      meaningful_choice: true
      refusal_available: true
      stop_authority_available: true
      repair_path_available: true
      adequate_review_time: true
      no_coercive_pressure: true

repairs: []

responsibility_boundary:
  human_author_required: true
  ai_final_responsibility_allowed: false
  institutional_authority_required_when_applicable: false
  legal_or_moral_claims_out_of_scope: true
  returning_does_not_auto_continue: true
  returning_requires_human_or_institutional_review: true

formalization_scope:
  assumptions:
    - The example models return from a suspended lifecycle state.
    - Returning makes the pathway available for human review; it does not automatically continue, repair, or close the pathway.
    - The AI support node may summarize evidence and compare return conditions but cannot decide the next lifecycle state.
    - The human decision owner remains the responsibility-bearing role for the returned pathway.
  modeled_entities:
    - human_decision_owner_001
    - ai_support_node_001
    - stop_authority_001
    - evidence_log_001
    - return_point_001
    - returning_001
  excluded_claims:
    - legal_liability
    - moral_blame
    - compliance
    - production_safety
    - fairness
    - certification
    - harm_elimination
    - real_world_accountability_resolution
    - returning_as_automatic_continuation
    - returning_as_repair_completion
    - returning_as_closure
  theorem_status: not_formalized
