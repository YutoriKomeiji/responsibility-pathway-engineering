# Minimal Responsibility Pathway record review example
#
# This example shows how a small Responsibility Pathway record can include
# review metadata without turning the review into certification.
#
# It is illustrative only. It does not claim legal validity, safety,
# compliance, fairness, moral accountability resolution, institutional
# certification, or production readiness.

id: record_review_minimal_example_001
version: 0.1.0
lifecycle_state: originating

nodes:
  - id: human_reviewer_001
    type: Human
    capabilities:
      - review
      - stop
      - return
      - close
    authority_scope:
      can_decide: true
      can_approve: true
      can_execute: false
      can_stop: true
      can_repair: false
      can_close: true
    evidence_binding:
      required: true
      log_reference: evidence_log_review_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: true

  - id: ai_support_node_001
    type: AIAgent
    capabilities:
      - summarize
      - classify
      - explain
      - return
    authority_scope:
      can_decide: false
      can_approve: false
      can_execute: false
      can_stop: false
      can_repair: false
      can_close: false
    evidence_binding:
      required: true
      log_reference: evidence_log_review_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: false
    ai_participation:
      may_summarize: true
      may_classify: true
      may_recommend: false
      may_execute_under_authority: false
      assumes_final_responsibility: false

edges:
  - from: human_reviewer_001
    to: ai_support_node_001
    relation_type: review_support_request
    condition: human_requests_record_summarization
    evidence_reference: evidence_log_review_001

  - from: ai_support_node_001
    to: human_reviewer_001
    relation_type: return_to_human_review
    condition: review_result_requires_human_judgment
    evidence_reference: evidence_log_review_001

roles:
  decision_owner: human_reviewer_001
  responsibility_owner: human_reviewer_001
  approval_gate: human_reviewer_001
  execution_actor: null
  stop_authority: human_reviewer_001
  evidence_log: evidence_log_review_001
  repair_owner: null
  return_point: return_point_review_001
  human_return_point: return_point_review_001
  human_or_institutional_return_point: return_point_review_001
  affected_party: null

action_class:
  id: class_1_record_review
  name: Internal Record Review
  level: 1
  description: Internal structural review of a Responsibility Pathway record.
  responsibility_requirements:
    decision_owner_required: true
    approval_gate_required: true
    stop_authority_required: true
    evidence_log_required: true
    return_point_required: true
    repair_owner_required: false
    affected_party_visibility_required: false
  reversibility: reversible
  external_impact: internal
  automation_boundary:
    may_be_automated: false
    requires_human_review: true
    requires_human_authorization: true
    prohibited_without_explicit_authority: true

evidence_logs:
  - id: evidence_log_review_001
    pathway_id: record_review_minimal_example_001
    evidence_categories:
      - record_version
      - lifecycle_state
      - node_roles
      - ai_support_boundary
      - return_point
      - stop_authority
      - excluded_claims
    integrity_state: partial
    ordering: timestamped
    reconstruction_support:
      can_reconstruct_action: true
      can_reconstruct_authority: true
      can_reconstruct_context: true
      can_reconstruct_uncertainty: false
      can_reconstruct_stop_point: true
      can_reconstruct_return_point: true
      can_reconstruct_repair_action: false
    quality:
      completeness: partial
      readability: human_readable
      availability: local_example
      scope_clarity: example_only
      retention_period: not_specified
      privacy_constraints: avoid_sensitive_data
      safety_constraints: no_production_use
    access_boundary:
      readable_by:
        - human_reviewer_001
      writable_by:
        - human_reviewer_001
      redaction_required: false
      retention_owner: human_reviewer_001
      repair_owner_access: not_applicable

return_points:
  - id: return_point_review_001
    type: HumanReturnPoint
    source_node: ai_support_node_001
    target_node: human_reviewer_001
    returnability_conditions:
      meaning_visible: true
      authority_visible: true
      time_available: true
      information_quality_sufficient: partial
      trust_calibrated: true
      reversibility_or_compensation_visible: true
      value_visible: true
      cost_visible: true
    supported_actions:
      - explain
      - reject
      - revise
      - stop
      - close
    evidence_requirements:
      evidence_log_required: true
      minimum_evidence_categories:
        - record_version
        - lifecycle_state
        - node_roles
        - excluded_claims
      reconstruction_required: true
      access_boundary: local_review
    human_conditions:
      understandable_information: true
      meaningful_choice: true
      refusal_available: true
      stop_authority_available: true
      repair_path_available: false
      adequate_review_time: true
      no_coercive_pressure: true

repairs: []

review_metadata:
  created_at: example_only
  updated_at: example_only
  review_tool_version: example-checker-0.1
  checked_items:
    - lifecycle_state
    - nodes
    - ai_support_boundary
    - human_return_point
    - stop_authority
    - evidence_records
    - excluded_claims
  unchecked_items:
    - legal_validity
    - safety
    - compliance
    - fairness
    - moral_resolution
    - production_readiness
  review_result:
    status: example_pass
    scope: structural_responsibility_pathway_review
    not_claimed:
      - legal_validity
      - safety_certification
      - compliance_certification
      - fairness_certification
      - moral_accountability_resolution
      - production_readiness

responsibility_boundary:
  human_author_required: true
  ai_final_responsibility_allowed: false
  institutional_authority_required_when_applicable: false
  legal_or_moral_claims_out_of_scope: true

formalization_scope:
  assumptions:
    - This example models internal structural review only.
    - AI support may summarize or classify, but does not decide.
    - The human reviewer remains the responsibility owner.
  modeled_entities:
    - human_reviewer_001
    - ai_support_node_001
    - evidence_log_review_001
    - return_point_review_001
  excluded_claims:
    - legal_validity
    - moral_accountability_resolution
    - compliance
    - safety
    - fairness
    - production_readiness
  theorem_status: not_formalized
