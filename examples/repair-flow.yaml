# Minimal repair flow example
#
# This example illustrates how a Responsibility Pathway may enter repair
# after ambiguity, incomplete evidence, or failed returnability is detected.
# It is not a certification, compliance claim, safety guarantee,
# legal assessment, moral accountability judgment, or production-ready model.

id: repair_flow_example_001
version: 0.1.0
lifecycle_state: repaired

nodes:
  - id: human_decision_owner_001
    type: Human
    capabilities:
      - receive
      - explain
      - suspend
      - return
      - repair
      - close
    authority_scope:
      can_decide: true
      can_approve: true
      can_execute: false
      can_stop: true
      can_repair: true
      can_close: true
    evidence_binding:
      required: true
      log_reference: evidence_log_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: true

  - id: ai_support_node_001
    type: AIAgent
    capabilities:
      - receive
      - preserve
      - transform
      - explain
      - escalate
      - return
    authority_scope:
      can_decide: false
      can_approve: false
      can_execute: false
      can_stop: false
      can_repair: false
      can_close: false
    evidence_binding:
      required: true
      log_reference: evidence_log_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: false
    ai_participation:
      may_generate: true
      may_recommend: true
      may_classify: true
      may_execute_under_authority: false
      assumes_final_responsibility: false

  - id: repair_owner_001
    type: Human
    capabilities:
      - receive
      - explain
      - escalate
      - repair
      - close
    authority_scope:
      can_decide: false
      can_approve: false
      can_execute: false
      can_stop: true
      can_repair: true
      can_close: true
    evidence_binding:
      required: true
      log_reference: evidence_log_001
      retention_scope: example_only
      access_boundary: local_review
    human_responsibility_capacity: true

edges:
  - from: human_decision_owner_001
    to: ai_support_node_001
    relation_type: delegated_support
    condition: human_requests_assistive_output
    evidence_reference: evidence_log_001

  - from: ai_support_node_001
    to: human_decision_owner_001
    relation_type: return_to_authority
    condition: ambiguity_or_uncertainty_detected
    evidence_reference: evidence_log_001

  - from: human_decision_owner_001
    to: repair_owner_001
    relation_type: repair_coordination
    condition: evidence_incomplete_or_returnability_unclear
    evidence_reference: evidence_log_001

roles:
  decision_owner: human_decision_owner_001
  approval_gate: human_decision_owner_001
  execution_actor: null
  stop_authority: human_decision_owner_001
  evidence_log: evidence_log_001
  repair_owner: repair_owner_001
  return_point: return_point_001
  human_return_point: return_point_001
  affected_party: null

action_class:
  id: class_2_controlled_execution
  name: Controlled Execution
  level: 2
  description: Controlled internal action where ambiguity requires repair before closure.
  responsibility_requirements:
    decision_owner_required: true
    approval_gate_required: true
    stop_authority_required: true
    evidence_log_required: true
    return_point_required: true
    repair_owner_required: true
    affected_party_visibility_required: false
  reversibility: partially_reversible
  external_impact: internal
  automation_boundary:
    may_be_automated: false
    requires_human_review: true
    requires_human_authorization: true
    prohibited_without_explicit_authority: true

evidence_logs:
  - id: evidence_log_001
    pathway_id: repair_flow_example_001
    evidence_categories:
      - actor_identity_or_role
      - decision_owner
      - approval_state
      - input
      - output
      - prompt_or_instruction
      - timestamp
      - authority_state
      - stop_condition
      - uncertainty
      - repair_action
      - post_event_explanation
    integrity_state: partial
    ordering: timestamped
    reconstruction_support:
      can_reconstruct_action: true
      can_reconstruct_authority: true
      can_reconstruct_context: true
      can_reconstruct_uncertainty: true
      can_reconstruct_stop_point: true
      can_reconstruct_return_point: true
      can_reconstruct_repair_action: true
    quality:
      completeness: partial
      readability: human_readable
      availability: local_example
      scope_clarity: example_only
      retention_period: not_specified
      privacy_constraints: avoid_sensitive_data
      safety_constraints: no_production_use
    access_boundary:
      readable_by:
        - human_decision_owner_001
        - repair_owner_001
      writable_by:
        - human_decision_owner_001
        - repair_owner_001
      redaction_required: false
      retention_owner: human_decision_owner_001
      repair_owner_access: true

return_points:
  - id: return_point_001
    type: HumanReturnPoint
    source_node: ai_support_node_001
    target_node: human_decision_owner_001
    returnability_conditions:
      meaning_visible: true
      authority_visible: true
      time_available: true
      information_quality_sufficient: partial
      trust_calibrated: true
      reversibility_or_compensation_visible: true
      value_visible: true
      cost_visible: true
    supported_actions:
      - explain
      - reject
      - escalate
      - suspend
      - repair
      - continue
      - close
    evidence_requirements:
      evidence_log_required: true
      minimum_evidence_categories:
        - input
        - output
        - authority_state
        - uncertainty
        - repair_action
      reconstruction_required: true
      access_boundary: local_review
    human_conditions:
      understandable_information: true
      meaningful_choice: true
      refusal_available: true
      stop_authority_available: true
      repair_path_available: true
      adequate_review_time: true
      no_coercive_pressure: true

repairs:
  - id: repair_001
    pathway_id: repair_flow_example_001
    trigger: evidence_incomplete
    repair_owner: repair_owner_001
    repair_state: documented
    affected_parties: []
    evidence_reference:
      evidence_log_id: evidence_log_001
      minimum_evidence_available: true
      missing_evidence:
        - full_context_before_initial_request
      evidence_access_boundary: local_review
    corrective_action: explain
    outcome: explanation_provided

responsibility_boundary:
  human_author_required: true
  ai_final_responsibility_allowed: false
  institutional_authority_required_when_applicable: false
  legal_or_moral_claims_out_of_scope: true

formalization_scope:
  assumptions:
    - The example models an internal controlled action and a repair record.
    - Evidence is partial and explicitly scoped.
    - Repair restores the pathway enough for explanation and closure, but does not resolve legal liability or moral blame.
    - The human decision owner and repair owner remain the responsibility-bearing human roles.
  modeled_entities:
    - human_decision_owner_001
    - ai_support_node_001
    - repair_owner_001
    - evidence_log_001
    - return_point_001
    - repair_001
  excluded_claims:
    - legal_liability
    - moral_blame
    - compliance
    - production_safety
    - fairness
    - harm_elimination
    - real_world_accountability_resolution
  theorem_status: not_formalized
