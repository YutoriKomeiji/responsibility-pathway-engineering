version: 0.1.0
kind: ResponsibilityPathwaySchema

purpose: >
  Defines the minimum machine-readable structure for a Responsibility Pathway
  instance composed of nodes, roles, lifecycle state, evidence, return points,
  and repair processes.

pathway:
  required_fields:
    - id
    - version
    - lifecycle_state
    - nodes
    - edges
    - roles
    - evidence_logs
    - responsibility_boundary

  fields:
    id:
      type: string
      description: Stable identifier for the Responsibility Pathway instance.
      review_alias: pathway_id

    version:
      type: string
      description: Schema or pathway version.
      review_alias: schema_version

    lifecycle_state:
      type: enum
      allowed_values:
        - originating
        - propagating
        - suspended
        - returning
        - repaired
        - closed

    nodes:
      type: list
      item_schema: spec/node.schema.yaml
      review_note: >
        Review tools may classify nodes by role, including AI support nodes and
        human or institutional responsibility nodes.

    edges:
      type: list
      description: Directed relations between nodes.
      suggested_fields:
        - from
        - to
        - relation_type
        - condition
        - evidence_reference

    roles:
      type: object
      suggested_fields:
        - decision_owner
        - responsibility_owner
        - approval_gate
        - execution_actor
        - stop_authority
        - evidence_log
        - repair_owner
        - return_point
        - human_return_point
        - institutional_return_point
        - human_or_institutional_return_point
        - affected_party

    action_class:
      type: object
      schema_reference: spec/action-class.schema.yaml

    evidence_logs:
      type: list
      item_schema: spec/evidence-log.schema.yaml
      review_alias: evidence_records

    return_points:
      type: list
      item_schema: spec/return-point.schema.yaml

    repairs:
      type: list
      item_schema: spec/repair.schema.yaml
      review_alias: repair_record

    suspension_condition:
      type: object
      description: Review or return condition for suspended pathways when applicable.

    return_condition:
      type: object
      description: Condition for returning pathways when applicable.

    closure_record:
      type: object
      description: Structural record of pathway closure when applicable.

    reopening_condition:
      type: object
      description: Condition under which a closed pathway may be reopened when applicable.

    responsibility_boundary:
      type: object
      required_suggested_fields:
        - human_author_required
        - ai_final_responsibility_allowed
        - institutional_authority_required_when_applicable
        - legal_or_moral_claims_out_of_scope

    formalization_scope:
      type: object
      suggested_fields:
        - assumptions
        - modeled_entities
        - excluded_claims
        - theorem_status

    review_metadata:
      type: object
      suggested_fields:
        - created_at
        - updated_at
        - review_tool_version
        - checked_items
        - unchecked_items
        - review_result
      description: >
        Optional metadata used by Responsibility Pathway record review tools.
        A review result remains structural and non-certifying.

record_review_alignment:
  guide: docs/responsibility-pathway-record-review.md
  note: >
    The review guide uses plain-language field names for after-the-fact review.
    This schema may use existing schema names while providing aliases or suggested
    fields for review tools. The alignment is structural only and does not create
    legal, safety, compliance, fairness, moral-resolution, certification, or
    production-readiness claims.
  minimum_review_concepts:
    - pathway_id
    - schema_version
    - lifecycle_state
    - participating_nodes
    - ai_support_nodes
    - human_or_institutional_return_point
    - stop_authority
    - approval_gate
    - responsibility_owner
    - evidence_records
    - repair_record
    - suspension_condition
    - return_condition
    - closure_record
    - reopening_condition
    - excluded_claims
    - created_at
    - updated_at
    - review_tool_version

validation_rules:
  - id: pathway_requires_human_author
    rule: >
      responsibility_boundary.human_author_required should be true.

  - id: ai_final_responsibility_not_allowed
    rule: >
      responsibility_boundary.ai_final_responsibility_allowed should be false.

  - id: ai_support_requires_return_point
    rule: >
      If AI support nodes are present, a human or institutional return point should be present.

  - id: suspended_requires_stop_or_return_reference
    rule: >
      If lifecycle_state is suspended, roles.stop_authority or return_points should be present.

  - id: repaired_requires_repair_record
    rule: >
      If lifecycle_state is repaired, repairs should contain at least one repair record.

  - id: returning_must_not_imply_automatic_continuation
    rule: >
      If lifecycle_state is returning, the record should not imply automatic continuation without human or institutional review.

  - id: closed_requires_evidence_and_reopening_condition
    rule: >
      If lifecycle_state is closed, evidence_logs and reopening_condition should preserve why and how the pathway may be reviewed or reopened.

  - id: review_result_is_non_certifying
    rule: >
      Any review result should remain structural and must not claim legal validity,
      safety, compliance, fairness, moral resolution, institutional certification,
      or production readiness.

boundary:
  - This schema models responsibility pathways, not legal liability.
  - This schema does not make real-world safety, fairness, compliance, or moral accountability claims.
  - Record review results are structural and non-certifying.
  - Formal claims must be limited to explicitly modeled entities, assumptions, and transitions.
