name: check-contract-compatibility

on:
  pull_request:
    paths:
      - "docs/contract-compatibility-policy.md"
      - "schemas/external-kernel/contract-versions.json"
      - "schemas/external-kernel/contract-versions.schema.json"
      - "schemas/external-kernel/*.schema.json"
      - "scripts/check_contract_compatibility.py"
      - ".github/workflows/check-contract-compatibility.yml"
  push:
    branches: [main]
    paths:
      - "docs/contract-compatibility-policy.md"
      - "schemas/external-kernel/contract-versions.json"
      - "schemas/external-kernel/contract-versions.schema.json"
      - "schemas/external-kernel/*.schema.json"
      - "scripts/check_contract_compatibility.py"
      - ".github/workflows/check-contract-compatibility.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Validate manifest structure with jsonschema
        run: |
          python -m pip install --disable-pip-version-check jsonschema
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator, FormatChecker

          root = Path('.')
          schema = json.loads((root / 'schemas/external-kernel/contract-versions.schema.json').read_text())
          instance = json.loads((root / 'schemas/external-kernel/contract-versions.json').read_text())
          Draft202012Validator(schema, format_checker=FormatChecker()).validate(instance)
          print('contract version schema: OK')
          PY
      - name: Check compatibility invariants
        run: python scripts/check_contract_compatibility.py
