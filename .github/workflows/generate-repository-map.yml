name: Generate repository map

on:
  workflow_dispatch:
    inputs:
      ref_name:
        description: Git ref used in generated browser links
        required: false
        default: main

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check generator behavior
        run: python scripts/check_repository_map_generator.py

      - name: Generate AI-readable repository map
        run: |
          python scripts/generate_repository_map.py \
            --ref "${{ inputs.ref_name || github.ref_name }}"

      - name: Upload generated map
        uses: actions/upload-artifact@v4
        with:
          name: repository-map-generated
          path: docs/ai-readable/repository-map.generated.md
          if-no-files-found: error
