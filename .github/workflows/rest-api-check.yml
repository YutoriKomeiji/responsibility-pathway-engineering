name: REST API check

on:
  pull_request:
    paths:
      - "rpe_kernel/**"
      - "scripts/check_rest_api.py"
      - "pyproject.toml"
      - ".github/workflows/rest-api-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - run: python -m pip install .
      - run: python scripts/check_rest_api.py
