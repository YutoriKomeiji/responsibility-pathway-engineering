name: Check pack applicability resolver

on:
  pull_request:
    paths:
      - "scripts/resolve_pack_applicability.py"
      - "scripts/check_pack_applicability_resolver.py"
      - "schemas/external-kernel/**"
      - "examples/external-kernel/applicability-*.json"
      - ".github/workflows/check-pack-applicability-resolver.yml"
  push:
    branches: [main]
    paths:
      - "scripts/resolve_pack_applicability.py"
      - "scripts/check_pack_applicability_resolver.py"
      - "schemas/external-kernel/**"
      - "examples/external-kernel/applicability-*.json"
      - ".github/workflows/check-pack-applicability-resolver.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check pack applicability resolver
        run: python scripts/check_pack_applicability_resolver.py
