name: Check Lean

on:
  push:
    paths:
      - "formal/lean/**/*.lean"
      - "lakefile.lean"
      - "lean-toolchain"
      - ".github/workflows/check-lean.yml"
  pull_request:
    paths:
      - "formal/lean/**/*.lean"
      - "lakefile.lean"
      - "lean-toolchain"
      - ".github/workflows/check-lean.yml"
  workflow_dispatch:

jobs:
  check-lean:
    name: Minimal Lean build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --no-modify-path
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show Lean versions
        run: |
          lean --version
          lake --version

      - name: Generate Lake manifest
        run: lake update

      - name: Build Lean package
        run: lake build
