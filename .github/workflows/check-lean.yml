name: Check Lean

on:
  push:
    paths:
      - "formal/lean/**/*.lean"
      - "lakefile.lean"
      - "lean-toolchain"
      - ".github/workflows/check-lean.yml"
  pull_request:
    paths:
      - "formal/lean/**/*.lean"
      - "lakefile.lean"
      - "lean-toolchain"
      - ".github/workflows/check-lean.yml"
  workflow_dispatch:

jobs:
  check-lean:
    name: Minimal Lean build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Lean build
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false
          lint: false
          use-mathlib-cache: false
