name: Publish static catalog to GitHub Pages

on:
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: "Deploy to GitHub Pages after Pages is enabled and configured to use GitHub Actions"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  package:
    name: Package static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify static catalog entry files
        run: |
          test -f site/index.html
          test -f site/catalog.js

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_pages == true
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Deploy artifact to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
