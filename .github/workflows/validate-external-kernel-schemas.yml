name: Validate external kernel schemas

on:
  pull_request:
    paths:
      - "schemas/external-kernel/**"
      - "examples/external-kernel/**"
      - "scripts/validate_external_kernel_schemas.py"
      - ".github/workflows/validate-external-kernel-schemas.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check "jsonschema>=4.22,<5"
      - name: Validate external kernel fixtures
        run: python scripts/validate_external_kernel_schemas.py
