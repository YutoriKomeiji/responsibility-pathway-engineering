name: Check runtime events

on:
  push:
    paths:
      - "examples/adapter-input-event-minimal.json"
      - "examples/minimal-synthetic-runtime-fixture.json"
      - "scripts/check_runtime_events.py"
      - ".github/workflows/check-runtime-events.yml"

permissions:
  contents: read

jobs:
  check-runtime-events:
    name: Bounded runtime-event checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.x"

      - name: Run bounded runtime-event checker
        run: python scripts/check_runtime_events.py
