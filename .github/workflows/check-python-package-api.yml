name: Check Python package API

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "rpe_kernel/**"
      - "scripts/check_python_package_api.py"
      - "examples/external-kernel/**"
      - ".github/workflows/check-python-package-api.yml"
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "rpe_kernel/**"
      - "scripts/check_python_package_api.py"
      - "examples/external-kernel/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install local package
        run: python -m pip install .
      - name: Check importable API
        run: python scripts/check_python_package_api.py
