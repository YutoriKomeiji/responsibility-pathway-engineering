name: Check external kernel multi-pack evaluator

on:
  pull_request:
    paths:
      - "scripts/run_external_kernel_multi.py"
      - "scripts/check_external_kernel_multi.py"
      - "examples/external-kernel/**"
      - ".github/workflows/check-external-kernel-multi.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check multi-pack evaluation
        run: python scripts/check_external_kernel_multi.py
