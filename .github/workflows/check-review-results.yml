name: Check review-result fixtures

on:
  push:
    paths:
      - "fixtures/review-results/**/*.yaml"
      - "spec/review-result.schema.yaml"
      - "scripts/check_review_results.py"
      - "requirements.txt"
      - ".github/workflows/check-review-results.yml"
  pull_request:
    paths:
      - "fixtures/review-results/**/*.yaml"
      - "spec/review-result.schema.yaml"
      - "scripts/check_review_results.py"
      - "requirements.txt"
      - ".github/workflows/check-review-results.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-review-results:
    name: Check review-result fixtures
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run bounded review-result checker
        run: python scripts/check_review_results.py
